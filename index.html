<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lector de Contador</title>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f4f4f9; }
    .card { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
    .numero { font-size: 3rem; font-weight: bold; color: #0056b3; margin: 1rem 0; }
  </style>
</head>
<body>

  <div class="card">
    <h2>Contador de QR</h2>
    <div id="resultado" class="numero">Cargando...</div>
    <button onclick="leerTxt()" style="padding: 10px 20px; cursor: pointer;">Actualizar</button>
  </div>

  <script>
    const url = "https://agripac.com.ec/0/AppEmpleados/data/qr_counter.txt";

    async function leerTxt() {
      const contenedor = document.getElementById('resultado');
      contenedor.innerText = "Cargando...";

      try {
        const respuesta = await fetch(url);
        
        if (!respuesta.ok) throw new Error(`Error HTTP: ${respuesta.status}`);
        
        const numero = await respuesta.text();
        contenedor.innerText = numero;
        
      } catch (error) {
        console.error("Error al leer el archivo:", error);
        contenedor.innerText = "Error (Ver consola)";
      }
    }

    // Ejecutar al abrir la página
    leerTxt();
  </script>

</body>
</html>
